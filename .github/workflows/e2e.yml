name: E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd='mysqladmin ping --silent'
          --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install mysql client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot &>/dev/null && break || sleep 1
          done

      - name: Create database
        run: mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS testing_db;"

      - name: Import schema
        run: mysql -h127.0.0.1 -uroot -proot testing_db < database.sql

      - name: Install Node deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Create dev token file
        run: echo "ci_dev_token" > .dev_token

      - name: Start PHP built-in server
        run: nohup php -S 127.0.0.1:8000 -t . > /tmp/php-server.log 2>&1 &

      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000/src/pages
        run: npx playwright test --config=playwright.config.js

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
